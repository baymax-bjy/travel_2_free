<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>飞猪千问 · 行程规划 Agent Demo (Grid版)</title>
  <style>
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }
    :root {
      --color-darkgray: #0f131a;
      --color-midgray: #5c5f66;
      --color-lightgray: #919499;
      --color-indigo-1: #6666ff;
      --color-indigo-4: #EBEBFF;
      --color-warning-1: #ff3333;
      --color-pay-1: #ff5533;
      --color-white: #ffffff;
      --color-label: #F7F8FA;
      --color-bg: #f2f3f5;
      --radius-xl: 36px;
      --radius-l: 24px;
      --radius-m: 12px;
      --radius-s: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--color-label);
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      width: 750px;
      overflow-x: hidden;
    }
    .content-area {
      padding: 176px 30px 258px;
      width: 750px;
      min-height: 100vh;
    }

    /* ===== 用户气泡 ===== */
    .user-bubble-wrap {
      display: flex;
      justify-content: flex-end;
      padding: 24px 0;
      width: 690px;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .user-bubble-wrap.visible { opacity: 1; transform: translateY(0); }
    .user-bubble {
      max-width: 600px; padding: 30px;
      background: linear-gradient(180deg, #E4E4FF 0%, #EDEDFF 100%);
      border-radius: var(--radius-xl);
    }
    .user-bubble p {
      font-weight: 500; font-size: 30px; line-height: 140%;
      color: var(--color-darkgray); word-wrap: break-word;
    }

    /* ===== AI 回复块 ===== */
    .ai-block {
      width: 690px; padding: 24px 0;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .ai-block.visible { opacity: 1; transform: translateY(0); }

    /* ===== 打字动画 ===== */
    .typing-indicator { display: inline-flex; align-items: center; gap: 8px; padding: 20px 0; }
    .typing-indicator .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--color-indigo-1); opacity: 0.3;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { opacity:0.3; transform:translateY(0); }
      30% { opacity:1; transform:translateY(-8px); }
    }

    /* ===== 文本 ===== */
    .article h2 {
      font-size: 36px; font-weight: 500; line-height: 1.4;
      color: var(--color-darkgray); margin-top: 36px;
    }
    .article h2:first-child { margin-top: 0; }
    .article h3 {
      font-size: 30px; font-weight: 500; line-height: 1.4;
      color: var(--color-darkgray); margin-top: 30px;
    }
    .article p {
      font-size: 28px; font-weight: 400; line-height: 1.7;
      color: var(--color-darkgray); margin-top: 16px;
    }
    .article p:first-child { margin-top: 0; }
    .article ul {
      margin-top: 12px; padding-left: 36px;
      font-size: 28px; line-height: 1.7; color: var(--color-darkgray);
    }
    .article ul li { margin-top: 8px; }

    /* ===== 版本标签 ===== */
    .version-tag {
      display: inline-flex; align-items: center; gap: 10px;
      height: 52px; padding: 0 24px;
      background: linear-gradient(135deg, #EBEBFF 0%, #E4E4FF 100%);
      border-radius: var(--radius-l);
      font-size: 24px; font-weight: 600; color: var(--color-indigo-1);
      margin-bottom: 20px;
    }

    /* ===== 行程卡片 ===== */
    .itinerary-card {
      width: 690px; margin-top: 24px;
      border-radius: var(--radius-xl);
      background: var(--color-white);
      overflow: hidden;
    }
    .itinerary-card-header {
      padding: 30px 30px 18px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid rgba(15,19,26,0.06);
    }
    .itinerary-card-header .badge {
      height: 48px; padding: 0 20px;
      background: var(--color-indigo-4); border-radius: var(--radius-l);
      font-size: 24px; font-weight: 500; color: var(--color-indigo-1);
      display: inline-flex; align-items: center;
    }
    .itinerary-card-header .title {
      font-size: 32px; font-weight: 500; color: var(--color-darkgray);
    }

    /* === 路线概览 === */
    .route-overview {
      padding: 24px 30px;
      border-bottom: 1px solid rgba(15,19,26,0.06);
    }
    .route-tag-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; }
    .route-tag {
      height: 48px; padding: 0 18px;
      background: var(--color-label); border-radius: var(--radius-m);
      font-size: 24px; color: var(--color-midgray);
      display: inline-flex; align-items: center; gap: 8px;
    }

    /* === 每日行程 === */
    .day-section { border-bottom: 1px solid rgba(15,19,26,0.06); }
    .day-section:last-child { border-bottom: none; }
    .day-header {
      padding: 24px 30px 0;
      display: flex; align-items: center; gap: 14px;
    }
    .day-num {
      font-family: 'Fliggy Sans 102','PingFang SC',sans-serif;
      font-size: 32px; font-weight: bold; color: var(--color-indigo-1);
    }
    .day-theme { font-size: 28px; font-weight: 500; color: var(--color-darkgray); }
    .day-body { padding: 14px 30px 24px; }
    .time-slot {
      display: flex; gap: 18px; padding: 14px 0;
      border-bottom: 1px solid rgba(15,19,26,0.03);
    }
    .time-slot:last-child { border-bottom: none; }
    .time-label {
      flex-shrink: 0; width: 90px;
      font-size: 24px; font-weight: 500; color: var(--color-indigo-1);
      padding-top: 2px;
    }
    .slot-info { flex: 1; }
    .slot-title { font-size: 28px; font-weight: 500; color: var(--color-darkgray); line-height: 1.5; }
    .slot-desc { font-size: 24px; color: var(--color-midgray); line-height: 1.5; margin-top: 4px; }
    .slot-img {
      width: 130px; height: 94px;
      border-radius: var(--radius-m);
      background-size: cover; background-position: center;
      background-color: #E0E0E0; flex-shrink: 0;
    }

    /* === 手绘地图 === */
    .map-section {
      padding: 24px 30px;
      border-bottom: 1px solid rgba(15,19,26,0.06);
    }
    .map-box {
      width: 100%; height: 360px;
      border-radius: var(--radius-l);
      overflow: hidden; position: relative;
      background: #e8e8e8;
    }
    .map-box canvas { width: 100%; height: 100%; }

    /* === 信息模块（住宿/美食/交通/预算/贴士） === */
    .info-module { padding: 24px 30px; border-bottom: 1px solid rgba(15,19,26,0.06); }
    .info-module:last-child { border-bottom: none; }
    .info-module-title {
      font-size: 28px; font-weight: 500; color: var(--color-darkgray);
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .info-module-title .icon { font-size: 26px; }
    .info-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(15,19,26,0.03);
    }
    .info-item:last-child { border-bottom: none; }
    .info-item-img {
      width: 100px; height: 76px;
      border-radius: var(--radius-m);
      background-size: cover; background-position: center;
      background-color: #E0E0E0; flex-shrink: 0;
    }
    .info-item-body { flex: 1; }
    .info-item-name { font-size: 26px; font-weight: 500; color: var(--color-darkgray); }
    .info-item-desc { font-size: 22px; color: var(--color-midgray); margin-top: 4px; line-height: 1.4; }
    .info-item-price {
      font-family: 'Fliggy Sans 102','PingFang SC',sans-serif;
      font-size: 28px; font-weight: bold; color: var(--color-pay-1);
      margin-top: 4px;
    }
    .info-text { font-size: 26px; color: var(--color-midgray); line-height: 1.6; }

    /* === 预算表 === */
    .budget-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .budget-table td {
      padding: 14px 0; font-size: 26px; color: var(--color-darkgray);
      border-bottom: 1px solid rgba(15,19,26,0.06);
    }
    .budget-table td:last-child {
      text-align: right;
      font-family: 'Fliggy Sans 102','PingFang SC',sans-serif;
      font-weight: bold;
    }
    .budget-table tr:last-child td {
      border-bottom: none; font-weight: 600;
      color: var(--color-indigo-1);
    }

    /* ===== 选择器（网格布局 - 旧版） ===== */
    .selector-wrap { width: 690px; padding-top: 24px; }
    .selector-title {
      font-size: 28px; font-weight: 500; color: var(--color-darkgray);
      margin-bottom: 18px;
    }
    .selector-group { margin-bottom: 24px; }
    .selector-group-label {
      font-size: 24px; font-weight: 500; color: var(--color-midgray);
      margin-bottom: 12px;
    }
    .selector-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }
    .selector-grid.three-col { grid-template-columns: repeat(3, 1fr); }
    .selector-option {
      min-height: 84px; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 16px 12px; gap: 4px;
      background: var(--color-white);
      border: 1.5px solid rgba(15,19,26,0.12);
      border-radius: var(--radius-l);
      font-size: 28px; font-weight: 500; color: #000;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .selector-option:active { transform: scale(0.97); }
    .selector-option .opt-desc { font-size: 22px; font-weight: 400; color: var(--color-lightgray); }
    .selector-option.is-active {
      background: var(--color-indigo-4);
      border-color: var(--color-indigo-1);
    }
    .selector-option.is-disabled { opacity: 0.5; pointer-events: none; }

    .confirm-btn {
      width: 100%; height: 84px; margin-top: 24px;
      display: flex; justify-content: center; align-items: center;
      background: var(--color-indigo-4); border-radius: var(--radius-l);
      border: none; font-family: 'PingFang SC',sans-serif;
      font-size: 28px; font-weight: 500; color: var(--color-indigo-1);
      cursor: pointer; transition: all 0.2s ease;
    }
    .confirm-btn:hover { background: #dcdbff; }
    .confirm-btn:active { transform: scale(0.98); }
    .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== 点赞分享 ===== */
    .like-share { width: 690px; padding-top: 24px; display: flex; flex-direction: column; gap: 18px; }
    .like-share .disclaimer { font-size: 24px; color: var(--color-lightgray); }
    .like-share .action-row { display: flex; justify-content: space-between; align-items: center; }
    .like-share .btn-group { display: flex; gap: 12px; }
    .action-btn {
      width: 72px; height: 72px;
      display: flex; justify-content: center; align-items: center;
      background: var(--color-white);
      border: 1px solid rgba(15,19,26,0.12);
      border-radius: var(--radius-l); cursor: pointer; padding: 0;
    }
    .action-btn:active { transform: scale(0.92); }
    .think-btn {
      display: flex; align-items: center; padding: 18px; gap: 12px;
      height: 72px; background: var(--color-white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: var(--radius-l); cursor: pointer;
    }
    .think-btn span { font-size: 26px; color: var(--color-darkgray); }

    /* ===== 追问 ===== */
    .followup-wrap { width: 690px; margin-top: 42px; display: flex; flex-direction: column; gap: 18px; }
    .followup-wrap .guide { font-size: 30px; line-height: 1.7; color: var(--color-darkgray); }
    .followup-list { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
    .followup-item {
      display: inline-flex; align-items: center; gap: 12px;
      height: 84px; padding: 24px;
      background: var(--color-white);
      border: 1px solid rgba(15,19,26,0.12);
      border-radius: var(--radius-l); text-decoration: none; cursor: pointer;
    }
    .followup-item:active { background: var(--color-bg); }
    .followup-item span { font-size: 26px; color: var(--color-darkgray); white-space: nowrap; }

    /* ===== 重启 ===== */
    .restart-btn {
      width: 690px; height: 80px; margin-top: 36px;
      display: flex; justify-content: center; align-items: center;
      background: var(--color-white);
      border: 1px solid rgba(15,19,26,0.12);
      border-radius: var(--radius-l);
      font-size: 28px; font-weight: 500; color: var(--color-indigo-1);
      cursor: pointer;
    }
    .restart-btn:active { background: var(--color-indigo-4); }

    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<!-- ====== 导航栏 ====== -->
<div style="position:fixed;top:0;left:0;width:750px;height:176px;z-index:9999;display:flex;flex-direction:column;">

<script>
// ==================================================================
// 行程规划 Agent — 3轮迭代引擎 (Grid版)
// ==================================================================
const chat = document.getElementById('chat');
const U = (id, w, h) => `https://images.unsplash.com/photo-${id}?w=${w}&h=${h}&fit=crop&q=80`;

// ---------- 工具函数 ----------
function scrollBottom() { setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 120); }
function append(html) { const d = document.createElement('div'); d.innerHTML = html; while(d.firstChild) chat.appendChild(d.firstChild); }
function show(el) { requestAnimationFrame(() => el.classList.add('visible')); }

function showTyping() {
  const id = 'tp-' + Date.now();
  append(`<div class="ai-block visible" id="${id}"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`);
  scrollBottom();
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

function addBubble(text) {
  const id = 'ub-' + Date.now();
  append(`<div class="user-bubble-wrap" id="${id}"><div class="user-bubble"><p>${text}</p></div></div>`);
  setTimeout(() => show(document.getElementById(id)), 50);
  scrollBottom();
}

// ---------- 手绘地图绘制 ----------
function drawMap(canvasId, points, color) {
  setTimeout(() => {
    const c = document.getElementById(canvasId);
    if (!c) return;
    const ctx = c.getContext('2d');
    c.width = c.offsetWidth * 2; c.height = c.offsetHeight * 2;
    ctx.scale(2, 2);
    const W = c.offsetWidth, H = c.offsetHeight;
    ctx.fillStyle = '#f0f0f0'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
    for (let x=0; x<W; x+=30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0; y<H; y+=30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.strokeStyle = color || '#6666ff'; ctx.lineWidth = 3;
    ctx.setLineDash([8,6]); ctx.lineJoin = 'round';
    ctx.beginPath();
    points.forEach((p,i) => { i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
    ctx.stroke(); ctx.setLineDash([]);
    points.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
      ctx.fillStyle = color || '#6666ff'; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.font = '500 13px PingFang SC, sans-serif'; ctx.fillStyle = '#0f131a';
      ctx.fillText(p.label, p.x + 12, p.y + 5);
    });
  }, 200);
}

// 数据

// ---- V1 骨架行程（概要版）----
function renderV1() {
  const mapId = 'map-v1';
  return `
    <div class="version-tag">📋 V1 · 行程骨架</div>
    <div class="itinerary-card">
      <div class="itinerary-card-header">
        <span class="badge">初版概要</span>
        <span class="title">东京 5 日游</span>
      </div>
      <div class="route-overview">
        <div style="font-size:26px;font-weight:500;color:var(--color-darkgray);">🗺️ 路线概览</div>
        <div class="route-tag-row">
          <span class="route-tag">📍 浅草</span>
          <span class="route-tag">→ 上野</span>
          <span class="route-tag">→ 涩谷</span>
          <span class="route-tag">→ 新宿</span>
          <span class="route-tag">→ 镰仓</span>
        </div>
      </div>
      <div class="map-section">
        <div style="font-size:26px;font-weight:500;color:var(--color-darkgray);margin-bottom:14px;">🖊️ 路线示意图</div>
        <div class="map-box"><canvas id="${mapId}"></canvas></div>
      </div>
      <div class="day-section">
        <div class="day-header"><span class="day-num">DAY 1</span><span class="day-theme">抵达 · 浅草寺 · 晴空塔</span></div>
        <div class="day-body"><div class="info-text">下午抵达东京，先逛浅草寺仲见世通，傍晚登晴空塔看夜景</div></div>
      </div>
      <div class="day-section">
        <div class="day-header"><span class="day-num">DAY 2</span><span class="day-theme">明治神宫 · 原宿 · 涩谷</span></div>
        <div class="day-body"><div class="info-text">清晨明治神宫，竹下通潮流打卡，涩谷十字路口</div></div>
      </div>
      <div class="day-section">

// 选择器点击事件（支持多选）
document.addEventListener('click', e => {
  const opt = e.target.closest('.selector-option');
  if (!opt || opt.classList.contains('is-disabled')) return;
  const group = opt.dataset.group;
  const multiSelect = opt.dataset.multi === 'true';
  if (multiSelect) {
    opt.classList.toggle('is-active');
  } else {
    const grid = opt.closest('.selector-grid');
    grid.querySelectorAll(`.selector-option[data-group="${group}"]`).forEach(o => o.classList.remove('is-active'));
    opt.classList.add('is-active');
  }
  const wrap = opt.closest('.selector-wrap');
  const btn = wrap.querySelector('.confirm-btn');
  const anyActive = wrap.querySelector('.selector-option.is-active');
  if (btn) { btn.disabled = !anyActive; btn.textContent = anyActive ? '确认，生成下一版行程 →' : '请先选择'; }
});

// 确认按钮
function onConfirm(round) {
  const wrap = document.getElementById(`sel-${round}`);
  const actives = wrap.querySelectorAll('.selector-option.is-active');
  const values = {};
  actives.forEach(a => {
    const g = a.dataset.group;
    if (!values[g]) values[g] = [];
    values[g].push(a.dataset.value);
  });

  Object.entries(values).forEach(([k, v]) => { state.choices[k] = v.join('、'); });

  wrap.querySelectorAll('.selector-option').forEach(o => { o.classList.add('is-disabled'); o.style.cursor='default'; });
  const btn = wrap.querySelector('.confirm-btn');
  btn.disabled = true; btn.textContent = '已确认 ✓';
  btn.style.background = 'var(--color-bg)'; btn.style.color = 'var(--color-midgray)';

  const summary = Object.entries(values).map(([k,v]) => v.join('、')).join('；');
  setTimeout(() => {
    addBubble(summary);
    state.round++;
    setTimeout(() => nextRound(), 400);
  }, 300);
}

function nextRound() {
  if (state.round === 1) showRound2();
  else if (state.round === 2) showRound3();
  else if (state.round === 3) showFinal();
}
